  <body>
    <!-- Branded loading splash: paints instantly (before the JS bundle) so there
         is no white flash. Removed by src/main.tsx once React has mounted. -->
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a3d44;
        transition: opacity 420ms ease;
      }
      #app-splash.app-splash--hide { opacity: 0; pointer-events: none; }
      #app-splash .app-splash__mark {
        width: 96px;
        height: 96px;
        object-fit: contain;
        /* Tint the teal mark to brand cream on the dark teal background. */
        filter: brightness(0) saturate(100%) invert(96%) sepia(6%) saturate(220%) hue-rotate(338deg) brightness(103%) contrast(95%);
        animation: app-splash-pulse 1400ms ease-in-out infinite;
      }
      @keyframes app-splash-pulse {
        0%   { transform: scale(0.9);  opacity: 0.55; }
        50%  { transform: scale(1.04); opacity: 1; }
        100% { transform: scale(0.9);  opacity: 0.55; }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .app-splash__mark { animation: none; opacity: 1; }
      }
    </style>
    <div id="app-splash" role="status" aria-label="Loading QuickLinq">
      <img class="app-splash__mark" src="/splash-mark.png" alt="" />
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
